<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Planches — SAMA</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="board-styles.css" />
</head>
<body class="mount-pending">
  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
      <rect width="100" height="100" fill="#FBFAF7" />
      <rect x="30" y="30" width="18" height="18" rx="5" fill="#7A5AE0" />
      <rect x="54" y="30" width="16" height="6" rx="3" fill="#14120E" />
      <rect x="54" y="42" width="12" height="6" rx="3" fill="#B5B2AA" />
      <rect x="30" y="54" width="40" height="6" rx="3" fill="#E2552B" />
      <rect x="30" y="64" width="28" height="6" rx="3" fill="#B5B2AA" />
    </svg>
  </template>

  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="board-icons.jsx"></script>
  <script type="text/babel" src="board-data.jsx"></script>
  <script type="text/babel" src="board-atoms.jsx"></script>
  <script type="text/babel" src="board-elements.jsx"></script>
  <script type="text/babel" src="board-app.jsx"></script>
  <script>
    // reveal once Babel has compiled & mounted
    const __reveal = () => {
      if (document.querySelector('#root').childElementCount) document.body.classList.remove('mount-pending');
      else setTimeout(__reveal, 40);
    };
    setTimeout(__reveal, 40);
  </script>
</body>
</html>
