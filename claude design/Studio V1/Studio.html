.note-it[data-k="whatsapp"] .icw { background: var(--ok-tint); color: var(--ok); }
.note-it .meta-line {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px; color: var(--text-3);
  margin-bottom: 4px;
  font-family: var(--font-mono);
}
.note-it .meta-line b { font-family: var(--font-ui); font-size: 12px; color: var(--text); font-weight: 500; }
.note-it .body { font-size: 12.5px; color: var(--text); line-height: 1.55; letter-spacing: -.005em; }
.note-it .body i { color: var(--accent-2); background: var(--accent-tint); padding: 0 4px; border-radius: 3px; font-style: normal; font-family: var(--font-mono); font-size: 11px; }

.note-composer {
  padding: 14px 18px;
  border-top: 1px solid var(--border);
  background: var(--surface-2);
}
.note-composer .channel-pick {
  display: flex; gap: 4px;
  margin-bottom: 8px;
}
.note-composer .channel-pick .b {
  height: 28px; padding: 0 10px;
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11.5px; font-weight: 500;
  border-radius: 6px;
  background: var(--surface);
  border: 1px solid var(--border-2);
  color: var(--text-2);
  letter-spacing: -.005em;
}
.note-composer .channel-pick .b[aria-pressed="true"] {
  background: var(--text); color: var(--bg); border-color: var(--text);
}
.note-composer textarea {
  width: 100%; min-height: 60px;
  background: var(--surface);
  border: 1px solid var(--border-2);
  border-radius: 8px;
  padding: 10px 12px;
  font: inherit; font-size: 12.5px;
  color: var(--text); outline: 0;
  letter-spacing: -.005em;
  font-family: var(--font-ui);
  resize: vertical;
}
.note-composer .ft {
  display: flex; align-items: center; gap: 6px;
  margin-top: 8px;
}
.note-composer .ft .spacer { flex: 1; }

/* Contact mini cards in detail side */
.contact-mini {
  display: grid;
  grid-template-columns: 32px 1fr auto;
  gap: 10px;
  align-items: center;
  padding: 9px 12px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 8px;
}
.contact-mini .av {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--text); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600;
  letter-spacing: -.01em;
}
.contact-mini .av.alt { background: var(--info); }
.contact-mini .nm { font-size: 12.5px; font-weight: 500; letter-spacing: -.005em; }
.contact-mini .role { font-size: 11px; color: var(--text-3); }
.contact-mini .actions { display: flex; gap: 4px; }
.contact-mini .actions .b {
  width: 22px; height: 22px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 5px;
  color: var(--text-3);
}
.contact-mini .actions .b:hover { background: var(--hover); color: var(--text); }

/* Value editor */
.value-edit {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 12px;
  background: var(--surface);
  border: 1px solid var(--border-2);
  border-radius: 8px;
}
.value-edit .lb {
  font-family: var(--font-mono); font-size: 10px;
  color: var(--text-3); text-transform: uppercase; letter-spacing: .07em;
  flex: 1;
}
.value-edit .val {
  font-family: var(--font-serif); font-size: 22px;
  letter-spacing: -.01em; color: var(--text);
}

/* sidebar KV list */
.side-kv {
  display: flex; flex-direction: column; gap: 8px;
}
.side-kv .row {
  display: grid;
  grid-template-columns: 96px 1fr;
  gap: 10px;
  align-items: flex-start;
  font-size: 12.5px;
}
.side-kv .k {
  font-size: 11.5px; color: var(--text-3);
  padding-top: 1px;
}
.side-kv .v { color: var(--text); font-weight: 500; letter-spacing: -.005em; word-break: break-word; }
.side-kv .v.mono { font-family: var(--font-mono); font-size: 11.5px; font-weight: 400; color: var(--text-2); }
.side-kv .v.link { color: var(--info); cursor: pointer; }

/* ───── Démarchage (file du jour with script) ───── */
.dem-script {
  background: var(--surface);
  border: 1px solid var(--border-2);
  border-radius: 12px;
  padding: 16px 18px;
}
.dem-script .h {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 6px;
}
.dem-script h3 {
  font-family: var(--font-serif); font-weight: 400;
  font-size: 18px; margin: 0;
  letter-spacing: -.005em;
}
.dem-script .meta {
  font-family: var(--font-mono); font-size: 11px;
  color: var(--text-3);
  display: flex; align-items: center; gap: 4px;
}
.dem-script .sb { font-size: 12px; color: var(--text-3); margin-bottom: 12px; }
.dem-script .scr {
  background: var(--surface-2);
  border-left: 3px solid var(--manual);
  border-radius: 0 8px 8px 0;
  padding: 13px 14px;
  font-size: 13.5px; line-height: 1.6;
  color: var(--text);
}
.dem-script .scr p { margin: 0 0 10px; }
.dem-script .scr p:last-child { margin: 0; }
.dem-script .scr .var {
  background: var(--accent-tint); color: var(--accent-2);
  padding: 1px 6px; border-radius: 4px;
  font-family: var(--font-mono); font-size: 12px;
}

.dem-obj {
  margin-top: 14px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.dem-obj .ob {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 9px 11px;
}
.dem-obj .ob .ttl {
  font-size: 11.5px; font-weight: 600;
  color: var(--text); display: flex; align-items: center; gap: 5px;
}
.dem-obj .ob .ttl::before {
  content: ""; width: 6px; height: 6px; border-radius: 50%;
  background: var(--warn);
}
.dem-obj .ob .ans {
  font-size: 11.5px; color: var(--text-3);
  margin-top: 4px; line-height: 1.45;
}

/* sticky CTA bar bottom */
.dem-cta {
  display: flex; gap: 8px;
  padding: 12px;
  background: var(--surface);
  border: 1px solid var(--border-2);
  border-radius: 12px;
  box-shadow: var(--shadow-2);
  margin-top: 6px;
}
.dem-cta .outcome-row {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}
.dem-cta .out {
  height: 40px;
  border-radius: 8px;
  border: 1px solid var(--border-2);
  background: var(--surface);
  display: flex; align-items: center; justify-content: center; gap: 6px;
  font-size: 12.5px; font-weight: 500;
  color: var(--text-2);
  cursor: default;
}
.dem-cta .out:hover { color: var(--text); border-color: var(--text); }
.dem-cta .out.ok    { color: var(--ok);     border-color: var(--ok-tint); }
.dem-cta .out.warn  { color: var(--warn);   border-color: var(--warn-tint); }
.dem-cta .out.danger{ color: var(--danger); border-color: var(--danger-tint); }
.dem-cta .out.ok:hover    { background: var(--ok-tint); }
.dem-cta .out.warn:hover  { background: var(--warn-tint); }
.dem-cta .out.danger:hover{ background: var(--danger-tint); }

/* sequence dots */
.seq-dots {
  display: flex; align-items: center; gap: 4px;
  flex-wrap: wrap;
}
.seq-dots .d {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--border-2);
}
.seq-dots .d.done { background: var(--ok); }
.seq-dots .d.cur { background: var(--accent); box-shadow: 0 0 0 3px var(--accent-tint); }
.seq-step {
  display: grid;
  grid-template-columns: 22px 1fr auto;
  gap: 8px;
  font-size: 11.5px;
  color: var(--text-2);
  padding: 6px 0;
}
.seq-step .ic {
  width: 18px; height: 18px; border-radius: 4px;
  background: var(--bg-2);
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--text-3);
}
.seq-step.done .ic { background: var(--ok-tint); color: var(--ok); }
.seq-step.cur .ic { background: var(--accent-tint); color: var(--accent-2); }
.seq-step .tm { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-4); }

</style>
