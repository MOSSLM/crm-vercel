<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Form Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<style>
  :root {
    /* Warm neutral — Linear/Notion-ish, with warmth for HVAC/solar */
    --bg: #FBFAF7;
    --bg-2: #F4F2EC;
    --surface: #FFFFFF;
    --surface-2: #F8F6F1;
    --hover: rgba(20, 18, 14, 0.04);
    --hover-2: rgba(20, 18, 14, 0.07);
    --border: rgba(20, 18, 14, 0.08);
    --border-2: rgba(20, 18, 14, 0.14);
    --border-strong: rgba(20, 18, 14, 0.22);
    --text: #14120E;
    --text-2: #5C5953;
    --text-3: #8A877F;
    --text-4: #B5B2AA;
    /* Accent: warm orange — flame/heat/solar */
    --accent: #E2552B;
    --accent-2: #C73E16;
    --accent-tint: rgba(226, 85, 43, 0.10);
    --accent-tint-2: rgba(226, 85, 43, 0.18);
    --ok: #1F8A5B;
    --warn: #C8881F;
    --danger: #B5322F;
    /* Logic node colors */
    --logic-cond: #6B5BD9;
    --logic-cond-tint: rgba(107, 91, 217, 0.10);
    --logic-action: #2B7FB8;
    --logic-action-tint: rgba(43, 127, 184, 0.10);

    --radius: 8px;
    --radius-sm: 6px;
    --radius-lg: 12px;
    --shadow-1: 0 1px 0 rgba(20,18,14,0.04), 0 1px 2px rgba(20,18,14,0.04);
    --shadow-2: 0 1px 0 rgba(20,18,14,0.04), 0 4px 12px rgba(20,18,14,0.06), 0 12px 32px rgba(20,18,14,0.05);
    --shadow-pop: 0 1px 0 rgba(20,18,14,0.04), 0 8px 24px rgba(20,18,14,0.10), 0 24px 64px rgba(20,18,14,0.10);

    --row-h: 28px;
    --tap-h: 32px;

    --font-ui: "Geist", ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    --font-mono: "Geist Mono", ui-monospace, "SF Mono", Menlo, monospace;
    --font-form: "Geist", ui-sans-serif, system-ui, sans-serif;
  }

  /* density */
  body[data-density="compact"] { --row-h: 24px; --tap-h: 28px; }
  body[data-density="cozy"]    { --row-h: 32px; --tap-h: 36px; }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); }
  body {
    font-family: var(--font-ui);
    font-size: 13px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    font-feature-settings: "ss01", "cv11";
    overflow: hidden;
  }
  button { font-family: inherit; }
  input, textarea, select { font-family: inherit; color: inherit; }
  ::selection { background: var(--accent-tint-2); }

  /* Scrollbars */
  *::-webkit-scrollbar { width: 10px; height: 10px; }
  *::-webkit-scrollbar-track { background: transparent; }
  *::-webkit-scrollbar-thumb {
    background: rgba(20,18,14,0.12);
    border-radius: 8px;
    border: 2px solid transparent;
    background-clip: content-box;
  }
  *::-webkit-scrollbar-thumb:hover { background: rgba(20,18,14,0.22); background-clip: content-box; border: 2px solid transparent;}

  /* ── Layout ───────────────────────────────────────────────── */
  #app { display: flex; flex-direction: column; height: 100vh; min-width: 1100px; }

  /* Topbar */
  .topbar {
    height: 44px;
    flex: 0 0 44px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 0 12px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    gap: 12px;
  }
  .topbar > .left-group { display: flex; align-items: center; gap: 8px; min-width: 0; overflow: hidden; }
  .topbar .brand {
    display: flex; align-items: center; gap: 8px;
    padding-right: 10px;
    border-right: 1px solid var(--border);
    height: 24px;
    margin-right: 4px;
  }
  .brand-mark {
    width: 22px; height: 22px;
    background: var(--text);
    color: var(--bg);
    border-radius: 5px;
    display:flex;align-items:center;justify-content:center;
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 11px;
    letter-spacing: -.02em;
  }
  .topbar .crumbs {
    display: flex; align-items: center; gap: 6px;
    font-size: 12.5px;
    color: var(--text-2);
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
  }
  .topbar .crumbs .cur {
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 240px;
  }
  .topbar .crumbs .sep { color: var(--text-4); flex-shrink: 0; }
  .topbar .crumbs .cur { color: var(--text); font-weight: 500; }
  .topbar .saved {
    font-size: 11.5px;
    color: var(--text-3);
    font-family: var(--font-mono);
    margin-left: 6px;
  }
  .topbar .saved i {
    display:inline-block; width:6px; height:6px; border-radius:50%;
    background: var(--ok);
    vertical-align: 1px;
    margin-right: 5px;
  }

  .tabs {
    display: flex;
    align-items: center;
    gap: 2px;
    background: var(--bg-2);
    padding: 3px;
    border-radius: 8px;
    justify-self: center;
  }
  .tab {
    appearance: none; border: 0; background: transparent;
    height: 26px; padding: 0 12px;
    font: inherit; font-size: 12.5px; font-weight: 500;
    color: var(--text-2);
    border-radius: 6px;
    cursor: default;
    display: flex; align-items: center; gap: 6px;
    letter-spacing: -.005em;
  }
  .tab:hover { color: var(--text); }
  .tab[aria-selected="true"] {
    background: var(--surface);
    color: var(--text);
    box-shadow: var(--shadow-1);
  }
  .tab kbd {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-4);
    background: var(--hover);
    padding: 1px 4px;
    border-radius: 3px;
  }

  .topbar .right { display: flex; align-items: center; gap: 6px; justify-self: end; }

  /* Buttons */
  .btn {
    appearance: none; border: 0; background: transparent;
    height: 28px; padding: 0 10px;
    font: inherit; font-size: 12.5px; font-weight: 500;
    color: var(--text);
    border-radius: 6px;
    cursor: default;
    display: inline-flex; align-items: center; gap: 6px;
    border: 1px solid transparent;
    white-space: nowrap;
  }
  .btn:hover { background: var(--hover); }
  .btn.ghost { color: var(--text-2); }
  .btn.outline { border-color: var(--border-2); background: var(--surface); }
  .btn.outline:hover { background: var(--surface-2); }
  .btn.primary {
    background: var(--text);
    color: var(--bg);
  }
  .btn.primary:hover { background: #000; }
  .btn.accent {
    background: var(--accent);
    color: #fff;
  }
  .btn.accent:hover { background: var(--accent-2); }
  .btn.danger { color: var(--danger); }
  .btn.icon { width: 28px; padding: 0; justify-content: center; }
  .btn.sm { height: 24px; padding: 0 8px; font-size: 12px; }
  .btn.sm.icon { width: 24px; padding: 0; }
  .btn[aria-pressed="true"] { background: var(--hover-2); }
  .btn[disabled] { opacity: .45; pointer-events: none; }

  .pill {
    display: inline-flex; align-items: center; gap: 5px;
    height: 20px; padding: 0 7px;
    font-size: 10.5px; font-weight: 500;
    color: var(--text-2);
    background: var(--bg-2);
    border-radius: 5px;
    font-family: var(--font-mono);
    letter-spacing: .02em;
  }
  .pill.accent { background: var(--accent-tint); color: var(--accent-2); }
  .pill.logic { background: var(--logic-cond-tint); color: var(--logic-cond); }
  .pill.req { background: var(--accent-tint); color: var(--accent-2); }

  /* Body grid */
  .body {
    flex: 1 1 auto;
    min-height: 0;
    display: grid;
    grid-template-columns: 260px 1fr 320px;
    grid-template-rows: 1fr;
  }
  body[data-density="compact"] .body { grid-template-columns: 220px 1fr 280px; }
  body[data-density="cozy"] .body { grid-template-columns: 280px 1fr 340px; }

  /* Generic pane */
  .pane {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    min-height: 0;
    overflow: hidden;
  }
  .pane:last-child { border-right: 0; border-left: 1px solid var(--border); }
  .pane-hd {
    display:flex; align-items:center; justify-content: space-between;
    height: 36px; flex: 0 0 36px;
    padding: 0 10px 0 14px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-weight: 600;
    color: var(--text-3);
    letter-spacing: .06em;
    text-transform: uppercase;
    background: var(--surface);
    white-space: nowrap;
  }
  .pane-hd .actions { display:flex; align-items:center; gap: 2px; }
  .pane-body { flex: 1 1 auto; overflow: auto; min-height: 0; }

  /* Status bar */
  .statusbar {
    height: 24px; flex: 0 0 24px;
    display: flex; align-items: center;
    padding: 0 12px;
    gap: 12px;
    border-top: 1px solid var(--border);
    background: var(--bg);
    color: var(--text-3);
    font-size: 11px;
    font-family: var(--font-mono);
  }
  .statusbar .dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--ok); margin-right: 5px;
  }
  .statusbar .sep { width:1px; height:12px; background: var(--border); }
  .statusbar .spacer { flex: 1; }
  .statusbar kbd {
    font: inherit;
    font-size: 10px;
    color: var(--text-3);
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: 4px;
    padding: 1px 5px;
    margin: 0 2px;
  }

  /* Icons baseline */
  .ico { width: 14px; height: 14px; flex-shrink: 0; stroke-width: 1.6; }
  .ico-sm { width: 12px; height: 12px; stroke-width: 1.6; }
  .ico-lg { width: 16px; height: 16px; stroke-width: 1.6; }

  /* Reusable hidden-until-mount */
  .mount-pending #app { visibility: hidden; }
</style>
</head>
