<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Site Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #FBFAF7;
    --bg-2: #F4F2EC;
    --bg-3: #ECE9E1;
    --surface: #FFFFFF;
    --surface-2: #F8F6F1;
    --hover: rgba(20, 18, 14, 0.04);
    --hover-2: rgba(20, 18, 14, 0.07);
    --border: rgba(20, 18, 14, 0.08);
    --border-2: rgba(20, 18, 14, 0.14);
    --border-strong: rgba(20, 18, 14, 0.22);
    --text: #14120E;
    --text-2: #5C5953;
    --text-3: #8A877F;
    --text-4: #B5B2AA;
    --accent: #E2552B;
    --accent-2: #C73E16;
    --accent-tint: rgba(226, 85, 43, 0.10);
    --accent-tint-2: rgba(226, 85, 43, 0.18);
    --ok: #1F8A5B;
    --warn: #C8881F;
    --danger: #B5322F;
    --info: #2A6FDB;
    --info-tint: rgba(42, 111, 219, 0.10);
    --magic: #7A5AE0;
    --magic-tint: rgba(122, 90, 224, 0.10);

    --radius: 8px;
    --radius-sm: 6px;
    --radius-lg: 12px;
    --shadow-1: 0 1px 0 rgba(20,18,14,0.04), 0 1px 2px rgba(20,18,14,0.04);
    --shadow-2: 0 1px 0 rgba(20,18,14,0.04), 0 4px 12px rgba(20,18,14,0.06), 0 12px 32px rgba(20,18,14,0.05);
    --shadow-pop: 0 1px 0 rgba(20,18,14,0.04), 0 8px 24px rgba(20,18,14,0.10), 0 24px 64px rgba(20,18,14,0.10);

    --row-h: 28px;
    --tap-h: 32px;

    --font-ui: "Geist", ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    --font-mono: "Geist Mono", ui-monospace, "SF Mono", Menlo, monospace;
    --font-serif: "Instrument Serif", "Times New Roman", serif;
  }

  body[data-density="compact"] { --row-h: 24px; --tap-h: 28px; }
  body[data-density="cozy"]    { --row-h: 32px; --tap-h: 36px; }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); }
  body {
    font-family: var(--font-ui);
    font-size: 13px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    font-feature-settings: "ss01", "cv11";
    overflow: hidden;
  }
  button { font-family: inherit; }
  input, textarea, select { font-family: inherit; color: inherit; }
  ::selection { background: var(--accent-tint-2); }

  *::-webkit-scrollbar { width: 10px; height: 10px; }
  *::-webkit-scrollbar-track { background: transparent; }
  *::-webkit-scrollbar-thumb {
    background: rgba(20,18,14,0.12);
    border-radius: 8px;
    border: 2px solid transparent;
    background-clip: content-box;
  }
  *::-webkit-scrollbar-thumb:hover { background: rgba(20,18,14,0.22); background-clip: content-box; border: 2px solid transparent;}

  /* ── Layout ───────────────────────────────────────────────── */
  #app { display: flex; flex-direction: column; height: 100vh; min-width: 1200px; }

  /* ── Topbar ──────────────────────────────────────────────── */
  .topbar {
    height: 44px;
    flex: 0 0 44px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 0 12px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    gap: 12px;
  }
  .topbar > .left-group { display: flex; align-items: center; gap: 8px; min-width: 0; overflow: hidden; }
  .topbar .brand {
    display: flex; align-items: center; gap: 8px;
    padding-right: 10px;
    border-right: 1px solid var(--border);
    height: 24px;
    margin-right: 4px;
  }
  .brand-mark {
    width: 22px; height: 22px;
    background: var(--text);
    color: var(--bg);
    border-radius: 5px;
    display:flex;align-items:center;justify-content:center;
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 11px;
    letter-spacing: -.02em;
    position: relative;
  }
  .brand-mark::after {
    content: "";
    position: absolute;
    inset: 4px;
    border-radius: 2px;
    border: 1.5px solid var(--bg);
    border-bottom: 0;
    border-right: 0;
  }

  /* breadcrumb */
  .topbar .crumbs {
    display: flex; align-items: center; gap: 6px;
    font-size: 12.5px;
    color: var(--text-2);
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
  }
  .topbar .crumbs .cur {
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 200px;
    color: var(--text); font-weight: 500;
  }
  .topbar .crumbs .sep { color: var(--text-4); flex-shrink: 0; }
  .topbar .saved {
    font-size: 11.5px;
    color: var(--text-3);
    font-family: var(--font-mono);
    margin-left: 6px;
    white-space: nowrap;
  }
  .topbar .saved i {
    display:inline-block; width:6px; height:6px; border-radius:50%;
    background: var(--ok);
    vertical-align: 1px;
    margin-right: 5px;
  }
  .topbar .saved.dirty i { background: var(--warn); }
  .topbar .saved.saving i { background: var(--info); animation: blink 1s ease-in-out infinite; }
  @keyframes blink { 50% { opacity: .35; } }

  /* dropdown trigger pill in topbar */
  .topchip {
    appearance: none; border: 1px solid var(--border-2);
    background: var(--surface);
    height: 24px; padding: 0 8px 0 7px;
    font: inherit; font-size: 12px; font-weight: 500;
    color: var(--text-2);
    border-radius: 6px;
    cursor: default;
    display: inline-flex; align-items: center; gap: 6px;
    max-width: 180px;
    white-space: nowrap;
  }
  .topchip:hover { background: var(--surface-2); color: var(--text); }
  .topchip .truncate { overflow: hidden; text-overflow: ellipsis; min-width: 0; }
  .topchip.empty { color: var(--text-3); border-style: dashed; }

  /* Workspace tabs */
  .tabs {
    display: flex;
    align-items: center;
    gap: 2px;
    background: var(--bg-2);
    padding: 3px;
    border-radius: 8px;
    justify-self: center;
  }
  .tab {
    appearance: none; border: 0; background: transparent;
    height: 26px; padding: 0 12px;
    font: inherit; font-size: 12.5px; font-weight: 500;
    color: var(--text-2);
    border-radius: 6px;
    cursor: default;
    display: flex; align-items: center; gap: 6px;
    letter-spacing: -.005em;
    white-space: nowrap;
  }
  .tab:hover { color: var(--text); }
  .tab[aria-selected="true"] {
    background: var(--surface);
    color: var(--text);
    box-shadow: var(--shadow-1);
  }
  .tab kbd {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-4);
    background: var(--hover);
    padding: 1px 4px;
    border-radius: 3px;
  }

  .topbar .right { display: flex; align-items: center; gap: 6px; justify-self: end; }

  /* Buttons */
  .btn {
    appearance: none; border: 0; background: transparent;
    height: 28px; padding: 0 10px;
    font: inherit; font-size: 12.5px; font-weight: 500;
    color: var(--text);
    border-radius: 6px;
    cursor: default;
    display: inline-flex; align-items: center; gap: 6px;
    border: 1px solid transparent;
    white-space: nowrap;
    position: relative;
  }
  .btn:hover { background: var(--hover); }
  .btn.ghost { color: var(--text-2); }
  .btn.outline { border-color: var(--border-2); background: var(--surface); }
  .btn.outline:hover { background: var(--surface-2); }
  .btn.subtle { background: var(--surface-2); border: 1px solid var(--border); color: var(--text-2); }
  .btn.subtle:hover { background: var(--bg-2); color: var(--text); }
  .btn.primary {
    background: var(--text);
    color: var(--bg);
  }
  .btn.primary:hover { background: #000; }
  .btn.accent {
    background: var(--accent);
    color: #fff;
  }
  .btn.accent:hover { background: var(--accent-2); }
  .btn.magic { background: var(--magic); color: #fff; }
  .btn.magic:hover { background: #6347c8; }
  .btn.danger { color: var(--danger); }
  .btn.icon { width: 28px; padding: 0; justify-content: center; }
  .btn.sm { height: 24px; padding: 0 8px; font-size: 12px; gap: 5px; }
  .btn.sm.icon { width: 24px; padding: 0; }
  .btn.xs { height: 20px; padding: 0 6px; font-size: 11px; gap: 4px; border-radius: 5px; }
  .btn[aria-pressed="true"] { background: var(--hover-2); color: var(--text); }
  .btn[disabled] { opacity: .45; pointer-events: none; }

  /* segmented control (used in topbar undo/redo group, device picker) */
  .seg {
    display: inline-flex; align-items: stretch;
    border: 1px solid var(--border-2);
    background: var(--surface);
    border-radius: 7px;
    overflow: hidden;
  }
  .seg > button {
    appearance: none; border: 0; background: transparent;
    height: 26px; padding: 0 8px;
    font: inherit; font-size: 12px; font-weight: 500;
    color: var(--text-2);
    cursor: default;
    display: inline-flex; align-items: center; gap: 5px;
    border-left: 1px solid var(--border);
  }
  .seg > button:first-child { border-left: 0; }
  .seg > button:hover { background: var(--hover); color: var(--text); }
  .seg > button[aria-pressed="true"] {
    background: var(--text); color: var(--bg);
  }
  .seg.compact > button { padding: 0 6px; height: 24px; }

  /* Pill */
  .pill {
    display: inline-flex; align-items: center; gap: 5px;
    height: 20px; padding: 0 7px;
    font-size: 10.5px; font-weight: 500;
    color: var(--text-2);
    background: var(--bg-2);
    border-radius: 5px;
    font-family: var(--font-mono);
    letter-spacing: .02em;
    white-space: nowrap;
  }
  .pill.ok    { background: rgba(31,138,91,.12); color: var(--ok); }
  .pill.info  { background: var(--info-tint);    color: var(--info); }
  .pill.warn  { background: rgba(200,136,31,.14); color: var(--warn); }
  .pill.accent { background: var(--accent-tint); color: var(--accent-2); }
  .pill.magic { background: var(--magic-tint);  color: var(--magic); }
  .pill.danger{ background: rgba(181,50,47,.10); color: var(--danger); }

  /* Body */
  .body {
    flex: 1 1 auto;
    min-height: 0;
    display: grid;
    grid-template-columns: 280px 1fr 260px;
    grid-template-rows: 1fr;
  }
  body[data-density="compact"] .body { grid-template-columns: 240px 1fr 240px; }
  body[data-density="cozy"] .body { grid-template-columns: 300px 1fr 280px; }

  /* Panes */
  .pane {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    min-height: 0;
    overflow: hidden;
  }
  .pane:last-child { border-right: 0; border-left: 1px solid var(--border); }
  .pane-hd {
    display:flex; align-items:center; justify-content: space-between;
    height: 36px; flex: 0 0 36px;
    padding: 0 10px 0 14px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-weight: 600;
    color: var(--text-3);
    letter-spacing: .06em;
    text-transform: uppercase;
    background: var(--surface);
    white-space: nowrap;
  }
  .pane-hd .title-with-icon {
    display: flex; align-items: center; gap: 6px;
    text-transform: none;
    letter-spacing: 0;
    font-size: 12.5px;
    color: var(--text);
  }
  .pane-hd.contextual {
    text-transform: none;
    letter-spacing: 0;
    color: var(--text);
    font-size: 12.5px;
  }
  .pane-hd .actions { display:flex; align-items:center; gap: 2px; }
  .pane-body { flex: 1 1 auto; overflow: auto; min-height: 0; }

  /* Section group inside a pane */
  .section {
    border-bottom: 1px solid var(--border);
    padding: 0;
  }
  .section.last, .section:last-child { border-bottom: 0; }
  .section-hd {
    display: flex; align-items: center; gap: 6px;
    height: 32px;
    padding: 0 14px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: .06em;
    cursor: default;
    user-select: none;
  }
  .section-hd:hover { background: var(--hover); color: var(--text-2); }
  .section-hd .chev { color: var(--text-4); transition: transform .15s ease; }
  .section-hd[aria-expanded="false"] .chev { transform: rotate(-90deg); }
  .section-hd .count {
    margin-left: auto; font-family: var(--font-mono);
    font-size: 10px; color: var(--text-4); font-weight: 500; letter-spacing: 0;
    text-transform: none;
  }
  .section-body { padding: 8px 14px 14px; }

  /* Form fields */
  .field { margin-bottom: 10px; }
  .field:last-child { margin-bottom: 0; }
  .field-label {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-3);
    margin-bottom: 5px;
    letter-spacing: 0;
    text-transform: none;
    white-space: nowrap;
  }
  .field-label .req { color: var(--accent); font-family: var(--font-mono); font-size: 10px; }
  .field-label .hint { color: var(--text-4); font-weight: 400; margin-left: auto; font-family: var(--font-mono); font-size: 10px; }
  .input, .textarea, .select {
    width: 100%;
    appearance: none;
    background: var(--surface);
    border: 1px solid var(--border-2);
    border-radius: 6px;
    height: 28px;
    padding: 0 8px;
    font: inherit; font-size: 12.5px;
    color: var(--text);
    outline: 0;
  }
  .textarea { min-height: 60px; padding: 6px 8px; resize: vertical; line-height: 1.4; }
  .input:focus, .textarea:focus, .select:focus { border-color: var(--text); }
  .input::placeholder, .textarea::placeholder { color: var(--text-4); }
  .input.mono { font-family: var(--font-mono); font-size: 12px; }
  .input.with-prefix { padding-left: 0; display: flex; align-items: center; }
  .field-row { display: flex; gap: 6px; }

  /* Color swatch row */
  .swatches { display: flex; gap: 6px; flex-wrap: wrap; }
  .swatch {
    width: 26px; height: 26px; border-radius: 6px;
    border: 1.5px solid var(--border);
    cursor: default;
    position: relative;
  }
  .swatch.selected { border-color: var(--text); box-shadow: 0 0 0 1.5px var(--bg), 0 0 0 3px var(--text); }
  .swatch.add {
    background: var(--surface-2); color: var(--text-3);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 14px; font-weight: 400;
  }

  /* Toggle row */
  .toggle-row {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 0;
  }
  .toggle-row .lbl { font-size: 12px; color: var(--text); flex: 1; }
  .toggle-row .desc { font-size: 11px; color: var(--text-3); margin-top: 2px; }
  .toggle {
    appearance: none; border: 0;
    width: 26px; height: 15px; border-radius: 999px;
    background: var(--border-2);
    position: relative;
    cursor: default;
    flex-shrink: 0;
  }
  .toggle::after {
    content: ""; position: absolute;
    top: 1.5px; left: 1.5px;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--surface);
    box-shadow: 0 1px 2px rgba(0,0,0,.15);
    transition: transform .15s ease;
  }
  .toggle[aria-checked="true"] { background: var(--text); }
  .toggle[aria-checked="true"]::after { transform: translateX(11px); }

  /* Status bar */
  .statusbar {
    height: 24px; flex: 0 0 24px;
    display: flex; align-items: center;
    padding: 0 12px;
    gap: 12px;
    border-top: 1px solid var(--border);
    background: var(--bg);
    color: var(--text-3);
    font-size: 11px;
    font-family: var(--font-mono);
  }
  .statusbar .dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--ok); margin-right: 5px;
  }
  .statusbar .sep { width:1px; height:12px; background: var(--border); }
  .statusbar .spacer { flex: 1; }
  .statusbar kbd {
    font: inherit;
    font-size: 10px;
    color: var(--text-3);
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: 4px;
    padding: 1px 5px;
    margin: 0 2px;
  }

  /* Icons */
  .ico    { width: 14px; height: 14px; flex-shrink: 0; stroke-width: 1.6; }
  .ico-sm { width: 12px; height: 12px; stroke-width: 1.6; }
  .ico-lg { width: 16px; height: 16px; stroke-width: 1.6; }
  .ico-xs { width: 10px; height: 10px; stroke-width: 1.7; }

  /* ── Canvas ────────────────────────────────────────────────────────── */
  .canvas-host {
    position: relative;
    width: 100%; height: 100%;
    background: var(--bg-2);
    overflow: hidden;
  }
  .canvas-dotgrid {
    position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(20,18,14,.10) 1px, transparent 1.5px);
    background-size: 22px 22px;
    pointer-events: none;
  }
  .canvas-stage {
    position: absolute;
    top: 0; left: 0;
    transform-origin: 0 0;
  }
  .page-meta-bar {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 14px;
  }
  .page-chip {
    display: inline-flex; align-items: center; gap: 6px;
    height: 26px; padding: 0 10px;
    background: var(--surface);
    border: 1px solid var(--border-2);
    border-radius: 7px;
    box-shadow: var(--shadow-1);
    font-size: 12px; font-weight: 500;
    color: var(--text);
  }
  .page-chip .slug { color: var(--text-4); font-family: var(--font-mono); font-size: 11px; }
  .page-tabs { display: flex; gap: 4px; }
  .page-tab {
    appearance: none; border: 1px solid var(--border-2);
    background: var(--surface);
    height: 24px; padding: 0 9px;
    font: inherit; font-size: 11.5px; font-weight: 500;
    color: var(--text-2);
    border-radius: 6px;
    cursor: default;
    display: inline-flex; align-items: center; gap: 5px;
    box-shadow: var(--shadow-1);
  }
  .page-tab:hover { background: var(--surface-2); color: var(--text); }
  .page-tab[aria-selected="true"] {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }
  .page-tab .pgnum { font-family: var(--font-mono); font-size: 10px; opacity: .55; }

  /* The "device frame" wrapper */
  .device-frame {
    border-radius: 14px;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(20,18,14,.04),
      0 12px 32px rgba(20,18,14,.10),
      0 32px 96px rgba(20,18,14,.10);
    background: #fff;
  }

  /* Section in canvas (the rendered website mock) */
  .ws-section {
    position: relative;
    outline: 2px solid transparent;
    transition: outline-color .12s ease, box-shadow .12s ease;
  }
  .ws-section[data-selected="true"] {
    outline-color: var(--accent);
  }
  .ws-section .ws-tag {
    position: absolute;
    top: 0; left: 0;
    z-index: 30;
    background: var(--accent);
    color: #fff;
    font-size: 10px; font-weight: 500;
    padding: 2px 7px;
    border-bottom-right-radius: 5px;
    font-family: var(--font-mono);
    letter-spacing: .02em;
    display: none;
  }
  .ws-section[data-selected="true"] .ws-tag { display: inline-flex; align-items: center; gap: 4px; }
  .ws-section .ws-tag .dot {
    width: 5px; height: 5px; border-radius: 50%; background: #fff; opacity: .8;
  }

  /* Selected element highlight (purple) */
  .el-sel {
    position: relative;
    outline: 2px solid var(--magic);
    outline-offset: 2px;
    border-radius: 2px;
  }
  .el-sel::after {
    content: attr(data-tag);
    position: absolute;
    bottom: -22px; left: -2px;
    background: var(--magic);
    color: #fff;
    font-family: var(--font-mono);
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 4px;
    white-space: nowrap;
    z-index: 40;
  }

  /* ── Mock rendered website styles (inside .device-frame) ─────────────── */
  .mock { font-family: var(--font-ui); color: #181612; }
  .mock-navbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 48px; border-bottom: 1px solid rgba(0,0,0,.06);
  }
  .mock-navbar .logo {
    display: flex; align-items: center; gap: 8px;
    font-weight: 600; font-size: 18px; letter-spacing: -.01em;
  }
  .mock-navbar .logo .mark {
    width: 24px; height: 24px; border-radius: 6px;
    background: linear-gradient(135deg, #f59e0b, #ef4444);
  }
  .mock-navbar .links { display: flex; gap: 28px; font-size: 13.5px; color: #4a463e; }
  .mock-navbar .cta {
    background: #181612; color: #fff;
    padding: 9px 16px; border-radius: 6px;
    font-size: 13px; font-weight: 500;
  }
  .mock-hero {
    padding: 80px 48px 96px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 56px;
    align-items: center;
    background: linear-gradient(180deg, #fffaf2 0%, #fff 100%);
  }
  .mock-hero .eyebrow {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11.5px; font-weight: 500; color: #b3491c;
    font-family: var(--font-mono); letter-spacing: .04em;
    text-transform: uppercase;
    margin-bottom: 18px;
  }
  .mock-hero .eyebrow .pulse {
    width: 6px; height: 6px; border-radius: 50%;
    background: #b3491c; box-shadow: 0 0 0 4px rgba(179, 73, 28, .18);
  }
  .mock-hero h1 {
    font-family: var(--font-serif);
    font-size: 56px; line-height: 1.02; margin: 0 0 18px;
    letter-spacing: -.02em; font-weight: 400;
    color: #1a1714;
  }
  .mock-hero h1 em {
    font-style: italic; color: #c14a1c;
  }
  .mock-hero p {
    font-size: 16.5px; line-height: 1.55; color: #57514a;
    margin: 0 0 28px; max-width: 460px;
  }
  .mock-hero .btn-row { display: flex; gap: 10px; }
  .mock-hero .btn-row .primary {
    background: #181612; color: #fff;
    padding: 13px 22px; border-radius: 8px;
    font-size: 14px; font-weight: 500;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .mock-hero .btn-row .ghost {
    border: 1px solid rgba(0,0,0,.12); color: #181612;
    padding: 13px 18px; border-radius: 8px;
    font-size: 14px; font-weight: 500;
    background: #fff;
  }
  .mock-hero .img-slot {
    aspect-ratio: 4/3.2;
    background: #ECE9E1;
    border-radius: 14px;
    background-image:
      repeating-linear-gradient(135deg, rgba(20,18,14,.04) 0 8px, transparent 8px 16px);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: rgba(20,18,14,.35);
    font-family: var(--font-mono);
    font-size: 11px;
    gap: 4px;
  }
  .mock-hero .img-slot .ph-mark {
    font-size: 10px; opacity: .7;
  }

  .mock-features {
    padding: 72px 48px;
    background: #fff;
  }
  .mock-features .lead {
    max-width: 560px; margin-bottom: 40px;
  }
  .mock-features .lead .kicker {
    font-family: var(--font-mono); text-transform: uppercase;
    font-size: 11px; letter-spacing: .08em; color: #b3491c;
    margin-bottom: 10px;
  }
  .mock-features .lead h2 {
    font-family: var(--font-serif);
    font-size: 38px; line-height: 1.1; letter-spacing: -.01em;
    font-weight: 400; margin: 0;
  }
  .mock-features .grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px;
  }
  .mock-features .card {
    border: 1px solid rgba(0,0,0,.07);
    border-radius: 12px;
    padding: 24px 22px;
    background: #fffaf2;
  }
  .mock-features .card .ic {
    width: 36px; height: 36px;
    border-radius: 8px;
    background: rgba(193, 74, 28, .12);
    display: flex; align-items: center; justify-content: center;
    color: #c14a1c;
    margin-bottom: 14px;
  }
  .mock-features .card h3 {
    font-size: 16px; font-weight: 600; margin: 0 0 6px;
    letter-spacing: -.005em;
  }
  .mock-features .card p {
    font-size: 13px; color: #57514a; line-height: 1.5; margin: 0;
  }

  /* Canvas bottom toolbar */
  .canvas-tools {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex; align-items: center; gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border-2);
    border-radius: 10px;
    padding: 4px;
    box-shadow: var(--shadow-2);
  }
  .canvas-tools .grp {
    display: inline-flex;
  }
  .canvas-tools .grp + .grp {
    border-left: 1px solid var(--border);
    margin-left: 4px; padding-left: 4px;
  }
  .canvas-tools button {
    appearance: none; border: 0; background: transparent;
    height: 26px; padding: 0 8px;
    font: inherit; font-size: 12px; font-weight: 500;
    color: var(--text-2);
    border-radius: 6px;
    cursor: default;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .canvas-tools button:hover { background: var(--hover); color: var(--text); }
  .canvas-tools button[aria-pressed="true"] {
    background: var(--text); color: var(--bg);
  }
  .canvas-tools .zoom-val {
    font-family: var(--font-mono); font-size: 11px;
    min-width: 38px; text-align: center;
    color: var(--text-2);
  }

  .canvas-help {
    position: absolute;
    bottom: 16px; right: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 10.5px; color: var(--text-3);
    font-family: var(--font-mono);
    box-shadow: var(--shadow-1);
  }
  .canvas-help kbd {
    font: inherit; padding: 0 4px;
    background: var(--bg-2);
    border-radius: 3px;
    color: var(--text-2);
  }

  /* ── Right Layers panel rows ─────────────────────────────────── */
  .layer-page {
    display: flex; align-items: center; gap: 6px;
    height: 26px; padding: 0 8px 0 6px;
    border-radius: 5px;
    font-size: 12px; font-weight: 500;
    cursor: default;
    color: var(--text-2);
  }
  .layer-page:hover { background: var(--hover); color: var(--text); }
  .layer-page[aria-selected="true"] {
    background: var(--accent-tint); color: var(--accent-2);
  }
  .layer-page .count {
    margin-left: auto; font-family: var(--font-mono);
    font-size: 10px; color: var(--text-4);
  }
  .layer-page[aria-selected="true"] .count { color: var(--accent-2); opacity: .75; }
  .layer-page .chev { color: var(--text-4); }
  .layer-page[aria-expanded="true"] .chev { transform: rotate(0deg); }
  .layer-page[aria-expanded="false"] .chev { transform: rotate(-90deg); }

  .layer-section {
    display: flex; align-items: center; gap: 5px;
    height: 24px;
    padding: 0 8px 0 4px;
    border-radius: 4px;
    font-size: 11.5px;
    color: var(--text);
    cursor: default;
    position: relative;
  }
  .layer-section:hover { background: var(--hover); }
  .layer-section[aria-selected="true"] {
    background: var(--accent-tint);
    color: var(--accent-2);
  }
  .layer-section[aria-selected="true"] .ico-section { color: var(--accent-2); }
  .layer-section .ico-section { color: var(--text-3); flex-shrink: 0; }
  .layer-section .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .layer-section .rowtools { display: none; gap: 1px; }
  .layer-section:hover .rowtools { display: flex; }
  .layer-section .rowtools button {
    appearance: none; border: 0; background: transparent;
    width: 18px; height: 18px;
    color: var(--text-3); border-radius: 3px;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: default;
  }
  .layer-section .rowtools button:hover { background: var(--hover-2); color: var(--text); }
  .layer-section .rowtools button.danger:hover { color: var(--danger); background: rgba(181,50,47,.08); }
  .layer-section.bulk-on { padding-left: 2px; }
  .layer-section.bulk-on[data-checked="true"] {
    background: var(--magic-tint); color: var(--magic);
  }

  .layer-field {
    display: flex; align-items: center; gap: 5px;
    height: 22px;
    padding: 0 8px 0 22px;
    border-radius: 4px;
    font-size: 11px;
    color: var(--text-3);
    cursor: default;
    min-width: 0;
  }
  .layer-field:hover { background: var(--hover); color: var(--text-2); }
  .layer-field[aria-selected="true"] { background: var(--magic-tint); color: var(--magic); }
  .layer-field .lbl {
    font-weight: 500; color: inherit;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    max-width: 90px; flex-shrink: 0;
  }
  .layer-field .prev {
    color: var(--text-4); font-size: 10.5px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    flex: 1 1 auto; min-width: 0;
  }
  .layer-field[aria-selected="true"] .prev { color: var(--magic); opacity: .55; }
  .layer-field .ico-kind { color: var(--text-4); flex-shrink: 0; }

  /* The left-side connecting border for nested rows */
  .layer-children {
    margin-left: 14px;
    border-left: 1px solid var(--border);
    padding-left: 4px;
  }

  /* Element panel header tag */
  .element-tag-pill {
    display: inline-flex; align-items: center; gap: 5px;
    height: 22px; padding: 0 8px;
    background: var(--magic-tint);
    color: var(--magic);
    border-radius: 5px;
    font-family: var(--font-mono);
    font-size: 11px; font-weight: 500;
  }

  /* AI prompt box */
  .ai-box {
    border: 1px solid var(--border-2);
    background: var(--surface);
    border-radius: 8px;
    overflow: hidden;
  }
  .ai-box-hd {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    background: var(--magic-tint);
    color: var(--magic);
    font-size: 11px; font-weight: 600;
  }
  .ai-box-hd .pill {
    margin-left: auto; font-size: 10px;
  }
  .ai-box textarea {
    width: 100%; border: 0; outline: 0; resize: vertical;
    padding: 10px;
    font: inherit; font-size: 12.5px;
    color: var(--text);
    background: transparent;
    min-height: 56px;
    line-height: 1.4;
  }
  .ai-box-ft {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 8px;
    border-top: 1px solid var(--border);
    background: var(--surface-2);
  }

  /* Element panel section card */
  .el-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
  }
  .el-preview {
    background: var(--bg-2);
    border: 1px dashed var(--border-2);
    border-radius: 6px;
    padding: 14px;
    text-align: center;
    color: var(--text-2);
    font-size: 12.5px;
  }

  /* dropdown popover (in topbar) */
  .pop {
    position: absolute; z-index: 60;
    background: var(--surface);
    border: 1px solid var(--border-2);
    border-radius: 10px;
    box-shadow: var(--shadow-pop);
    overflow: hidden;
    min-width: 240px;
  }

  .empty-row {
    padding: 8px 6px;
    color: var(--text-4);
    font-size: 11px; font-style: italic;
  }

  /* Mount */
  .mount-pending #app { visibility: hidden; }

  /* ── Workspace-aware body grid override ────────────────────────────────── */
  body[data-workspace="sitemap"]    .body { grid-template-columns: 280px 1fr; }
  body[data-workspace="wireframe"]  .body { grid-template-columns: 260px 1fr; }
  body[data-workspace="style-guide"] .body { grid-template-columns: 1fr; }
  body[data-workspace="content"]    .body { grid-template-columns: 1fr; }

  /* ── Modals ────────────────────────────────────────────────────────────── */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(20, 18, 14, .45);
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .modal-shell {
    background: var(--surface);
    border: 1px solid var(--border-2);
    border-radius: 14px;
    box-shadow: var(--shadow-pop);
    max-height: 85vh;
    display: flex; flex-direction: column;
    overflow: hidden;
    width: 100%;
  }
  .modal-shell.sm    { max-width: 420px; }
  .modal-shell.md    { max-width: 560px; }
  .modal-shell.lg    { max-width: 800px; }
  .modal-shell.xl    { max-width: 1040px; }
  .modal-hd {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .modal-hd .title { font-size: 13.5px; font-weight: 600; color: var(--text); letter-spacing: -.005em; }
  .modal-hd .subtitle { font-size: 11.5px; color: var(--text-3); margin-top: 2px; }
  .modal-hd .ic-wrap {
    width: 28px; height: 28px;
    border-radius: 7px;
    background: var(--accent-tint);
    color: var(--accent-2);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .modal-hd .ic-wrap.magic { background: var(--magic-tint); color: var(--magic); }
  .modal-hd .ic-wrap.info  { background: var(--info-tint);  color: var(--info); }
  .modal-hd .grow { flex: 1; min-width: 0; }
  .modal-body {
    flex: 1 1 auto;
    overflow: auto;
    padding: 18px;
  }
  .modal-body.dense { padding: 14px 18px; }
  .modal-ft {
    display: flex; align-items: center; justify-content: flex-end; gap: 8px;
    padding: 12px 18px;
    border-top: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }
  .modal-ft .grow { flex: 1; }

  .modal-search {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 18px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .modal-search .input {
    height: 30px; padding-left: 30px;
    background: var(--surface-2);
    background-image: none;
  }
  .modal-search .search-wrap { position: relative; flex: 1; }
  .modal-search .search-wrap > svg {
    position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
    color: var(--text-4);
  }
  .modal-tabs {
    display: flex; gap: 4px; padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .modal-tab {
    appearance: none; border: 1px solid transparent; background: var(--bg-2);
    height: 22px; padding: 0 10px;
    font: inherit; font-size: 11px; font-weight: 500;
    color: var(--text-2);
    border-radius: 5px;
    cursor: default;
  }
  .modal-tab:hover { background: var(--hover-2); }
  .modal-tab[aria-selected="true"] { background: var(--text); color: var(--bg); }

  /* Section card (in picker / library) */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .card-grid.cols2 { grid-template-columns: repeat(2, 1fr); }
  .picker-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    cursor: default;
    transition: border-color .12s ease, box-shadow .12s ease, transform .12s ease;
  }
  .picker-card:hover {
    border-color: var(--accent-tint-2);
    box-shadow: var(--shadow-2);
  }
  .picker-card .preview {
    height: 80px;
    background: var(--bg-2);
    background-image: repeating-linear-gradient(135deg, rgba(20,18,14,.05) 0 6px, transparent 6px 12px);
    display: flex; align-items: center; justify-content: center;
    color: var(--text-4);
    position: relative;
  }
  .picker-card .preview .badge {
    position: absolute; top: 6px; left: 6px;
    height: 16px; padding: 0 6px;
    background: var(--info); color: #fff;
    border-radius: 4px;
    font-size: 9px; font-weight: 600;
    display: inline-flex; align-items: center;
  }
  .picker-card .preview .badge.magic { background: var(--magic); }
  .picker-card .meta {
    padding: 10px 12px;
  }
  .picker-card .meta .name {
    font-size: 12.5px; font-weight: 500;
    color: var(--text);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .picker-card .meta .cat {
    font-size: 10.5px; color: var(--text-4);
    margin-top: 2px; font-family: var(--font-mono);
  }
  .picker-card .meta .stats {
    margin-top: 6px;
    display: flex; gap: 10px;
    font-size: 10.5px; color: var(--text-3);
    font-family: var(--font-mono);
  }
  .picker-card .meta .stats span { display: inline-flex; align-items: center; gap: 4px; }

  /* ── Sitemap workspace ──────────────────────────────────────────────────── */
  .sm-canvas { position: relative; width: 100%; height: 100%; background: var(--bg-2); overflow: hidden; }
  .sm-stage {
    position: absolute; top: 0; left: 0;
    transform-origin: 0 0;
  }
  .sm-root-node {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--text);
    color: var(--bg);
    border-radius: 10px;
    padding: 10px 14px;
    box-shadow: var(--shadow-2);
    font-size: 13px; font-weight: 500;
    letter-spacing: -.005em;
  }
  .sm-root-node .ic {
    width: 22px; height: 22px; border-radius: 5px;
    background: rgba(255,255,255,.12);
    display: flex; align-items: center; justify-content: center;
  }
  .sm-page-card {
    background: var(--surface);
    border: 1px solid var(--border-2);
    border-radius: 10px;
    box-shadow: var(--shadow-1);
    overflow: visible;
    transition: border-color .12s ease, box-shadow .12s ease;
  }
  .sm-page-card:hover { box-shadow: var(--shadow-2); }
  .sm-page-card[data-active="true"] {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-tint), var(--shadow-2);
  }
  .sm-page-card .hd {
    display: flex; align-items: center; gap: 6px;
    padding: 10px 10px 10px 12px;
    border-bottom: 1px solid var(--border);
  }
  .sm-page-card .hd .ic {
    width: 22px; height: 22px; border-radius: 5px;
    background: var(--accent-tint); color: var(--accent-2);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .sm-page-card .hd .title {
    flex: 1; font-size: 12.5px; font-weight: 600; color: var(--text);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .sm-page-card .hd .slug {
    font-family: var(--font-mono); font-size: 10.5px; color: var(--text-4);
    margin-right: 4px;
  }
  .sm-page-card .hd .tools { display: flex; gap: 1px; }
  .sm-page-card .hd .tools button {
    appearance: none; border: 0; background: transparent;
    width: 22px; height: 22px;
    color: var(--text-3); border-radius: 4px;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: default;
  }
  .sm-page-card .hd .tools button:hover { background: var(--hover); color: var(--text); }
  .sm-page-card .hd .tools button.magic-on { background: var(--magic-tint); color: var(--magic); }
  .sm-page-card .sec-row {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }
  .sm-page-card .sec-row:last-of-type { border-bottom: 0; }
  .sm-page-card .sec-row .name { font-size: 11.5px; font-weight: 500; color: var(--text); }
  .sm-page-card .sec-row .desc {
    font-size: 10.5px; color: var(--text-3); line-height: 1.4;
    margin-top: 2px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .sm-page-card .add-row {
    padding: 8px 10px;
    text-align: center;
    border-top: 1px dashed var(--border-2);
    color: var(--text-3); font-size: 11px;
    cursor: default;
    display: flex; align-items: center; justify-content: center; gap: 5px;
  }
  .sm-page-card .add-row:hover { background: var(--hover); color: var(--text); }
  .sm-page-card .ai-ctx {
    padding: 10px 12px;
    background: var(--magic-tint);
    border-bottom: 1px solid var(--border);
  }
  .sm-page-card .ai-ctx textarea {
    width: 100%;
    border: 1px solid var(--border-2);
    border-radius: 5px;
    padding: 6px 8px;
    font: inherit; font-size: 11px;
    background: var(--surface); color: var(--text);
    resize: none;
    outline: none;
  }
  .sm-page-card .ai-ctx textarea:focus { border-color: var(--magic); }
  .sm-add-page {
    width: 36px; height: 36px;
    border: 2px dashed var(--border-2);
    background: var(--surface);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-3);
    cursor: default;
    box-shadow: var(--shadow-1);
  }
  .sm-add-page:hover { color: var(--text); border-color: var(--border-strong); }

  /* Left AI panel (Sitemap workspace) */
  .ai-side-hd {
    padding: 14px 14px 8px;
    border-bottom: 1px solid var(--border);
  }
  .ai-side-hd .title {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 600; color: var(--text);
  }
  .ai-side-hd .title .mark {
    color: var(--magic);
    display: inline-flex; align-items: center;
  }
  .ai-side-hd .desc {
    font-size: 11.5px; color: var(--text-3); margin-top: 4px; line-height: 1.45;
  }

  .ai-side-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 12px; }
  .ai-side-foot { padding: 12px 14px; border-top: 1px solid var(--border); background: var(--bg); }

  .model-pick {
    border: 1px solid var(--border-2);
    background: var(--surface);
    border-radius: 7px;
    padding: 7px 10px;
    display: flex; align-items: center; justify-content: space-between;
    cursor: default;
    font-size: 12px;
  }
  .model-pick .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent);
  }
  .model-pick .dot.openai { background: var(--ok); }
  .model-pick:hover { background: var(--surface-2); }

  .alert-soft {
    display: flex; gap: 8px; align-items: flex-start;
    padding: 8px 10px;
    border-radius: 7px;
    font-size: 11.5px; line-height: 1.45;
  }
  .alert-soft.warn   { background: rgba(200,136,31,.10);  color: #8a5700; border: 1px solid rgba(200,136,31,.30); }
  .alert-soft.info   { background: var(--info-tint);     color: #0d4a98; border: 1px solid rgba(42,111,219,.30); }
  .alert-soft.ok     { background: rgba(31,138,91,.10);  color: #0e5938; border: 1px solid rgba(31,138,91,.30); }

  .page-pill {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 8px;
    background: var(--bg-2);
    border-radius: 6px;
    font-size: 11.5px; color: var(--text-2);
  }
  .page-pill .pgnum {
    font-family: var(--font-mono); font-size: 10px; color: var(--text-4);
  }

  /* ── Wireframe workspace ──────────────────────────────────────────────── */
  .wf-side-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
  }
  .wf-side-tabs button {
    flex: 1;
    appearance: none; border: 0; background: transparent;
    height: 38px;
    font: inherit; font-size: 12.5px; font-weight: 500;
    color: var(--text-3);
    cursor: default;
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    position: relative;
  }
  .wf-side-tabs button:hover { color: var(--text-2); }
  .wf-side-tabs button[aria-selected="true"] {
    color: var(--text);
  }
  .wf-side-tabs button[aria-selected="true"]::after {
    content: ""; position: absolute;
    bottom: -1px; left: 12px; right: 12px;
    height: 2px;
    background: var(--text);
    border-radius: 1px 1px 0 0;
  }
  .wf-side-tabs button.magic[aria-selected="true"] { color: var(--magic); }
  .wf-side-tabs button.magic[aria-selected="true"]::after { background: var(--magic); }

  .wf-search {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
  }
  .wf-cats {
    display: flex; gap: 4px; flex-wrap: wrap;
    margin-top: 8px;
  }
  .wf-cat {
    appearance: none; border: 0;
    background: var(--bg-2);
    color: var(--text-2);
    height: 20px; padding: 0 8px;
    border-radius: 999px;
    font: inherit; font-size: 10.5px; font-weight: 500;
    cursor: default;
  }
  .wf-cat:hover { background: var(--hover-2); }
  .wf-cat[aria-selected="true"] { background: var(--text); color: var(--bg); }

  .wf-sec-list { padding: 6px; }
  .wf-sec-row {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 8px;
    border-radius: 6px;
    cursor: default;
  }
  .wf-sec-row:hover { background: var(--hover); }
  .wf-sec-row .thumb {
    width: 36px; height: 26px;
    border-radius: 4px;
    background: var(--bg-2);
    background-image: repeating-linear-gradient(135deg, rgba(20,18,14,.06) 0 4px, transparent 4px 8px);
    flex-shrink: 0;
    border: 1px solid var(--border);
  }
  .wf-sec-row .info { flex: 1; min-width: 0; }
  .wf-sec-row .info .name {
    font-size: 12px; font-weight: 500; color: var(--text);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .wf-sec-row .info .cat {
    font-size: 10px; color: var(--text-4); font-family: var(--font-mono);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .wf-sec-row .add-btn {
    opacity: 0; transition: opacity .12s ease;
    appearance: none; border: 0;
    width: 22px; height: 22px;
    border-radius: 5px;
    background: var(--text); color: var(--bg);
    display: inline-flex; align-items: center; justify-content: center;
    cursor: default;
    flex-shrink: 0;
  }
  .wf-sec-row:hover .add-btn { opacity: 1; }

  /* Wireframe canvas — section blocks in B&W */
  .wf-section {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 28px 36px;
    position: relative;
  }
  .wf-section .toolbar {
    position: absolute;
    top: 8px; right: 8px;
    display: none;
    align-items: center; gap: 1px;
    background: var(--surface);
    border: 1px solid var(--border-2);
    border-radius: 7px;
    padding: 3px;
    box-shadow: var(--shadow-1);
  }
  .wf-section:hover .toolbar { display: inline-flex; }
  .wf-section .toolbar > span {
    font-size: 10.5px; color: var(--text-3);
    padding: 0 6px;
    font-weight: 500;
  }
  .wf-section .toolbar button {
    appearance: none; border: 0; background: transparent;
    width: 22px; height: 22px;
    color: var(--text-3); border-radius: 4px;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: default;
  }
  .wf-section .toolbar button:hover { background: var(--hover-2); color: var(--text); }
  .wf-section .toolbar button.magic:hover { color: var(--magic); background: var(--magic-tint); }
  .wf-section.selected { outline: 2px solid var(--accent); outline-offset: -2px; }
  .wf-bar { background: rgba(20,18,14,.08); border-radius: 4px; height: 14px; }
  .wf-bar.short { width: 36%; }
  .wf-bar.med   { width: 56%; }
  .wf-bar.long  { width: 74%; }
  .wf-bar.title { height: 22px; background: rgba(20,18,14,.16); }
  .wf-bar.cta   { width: 110px; height: 32px; background: rgba(20,18,14,.18); border-radius: 6px; }
  .wf-bar.cta.ghost { background: transparent; border: 1.5px solid rgba(20,18,14,.16); }
  .wf-card-box {
    background: rgba(20,18,14,.04);
    border: 1px solid rgba(20,18,14,.08);
    border-radius: 8px;
    padding: 14px;
    min-height: 110px;
  }
  .wf-img-box {
    background: rgba(20,18,14,.06);
    background-image: repeating-linear-gradient(135deg, rgba(20,18,14,.04) 0 8px, transparent 8px 16px);
    border-radius: 8px;
  }

  /* ── Style Guide workspace ─────────────────────────────────────────────── */
  .sg-split {
    display: grid;
    grid-template-columns: 42% 1fr;
    height: 100%;
    overflow: hidden;
  }
  body[data-density="compact"] .sg-split { grid-template-columns: 38% 1fr; }
  .sg-side {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    min-height: 0; overflow: hidden;
  }
  .sg-side-hd {
    display: flex; align-items: center; justify-content: space-between;
    height: 38px; flex-shrink: 0;
    padding: 0 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .sg-side-hd .title { font-size: 12.5px; font-weight: 600; color: var(--text); }
  .sg-side-hd .hint { font-size: 11px; color: var(--text-4); font-family: var(--font-mono); }
  .sg-zones { flex: 1; overflow: auto; padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }

  .zone-card {
    background: var(--surface);
    border: 1px solid var(--border-2);
    border-radius: 10px;
    padding: 12px 14px;
    cursor: default;
    transition: border-color .12s ease, background .12s ease;
  }
  .zone-card:hover { border-color: var(--border-strong); background: var(--surface-2); }
  .zone-card .zh {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
    font-size: 10.5px; font-weight: 600;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: .06em;
  }
  .zone-card .zh .ic-wrap {
    width: 24px; height: 24px;
    border-radius: 5px;
    background: var(--accent-tint); color: var(--accent-2);
    display: inline-flex; align-items: center; justify-content: center;
    margin-right: 7px;
  }
  .zone-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .sg-preview-host {
    background: var(--bg-2);
    display: flex; flex-direction: column;
    min-height: 0;
  }
  .sg-preview-bar {
    display: flex; align-items: center; justify-content: space-between;
    height: 38px; padding: 0 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .sg-preview-bar .title { font-size: 12px; color: var(--text-2); font-weight: 500; }
  .sg-preview-frame {
    flex: 1; overflow: auto;
    padding: 18px;
  }
  .sg-preview-frame > .frame-inner {
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-2);
    background: #fff;
  }

  /* Big swatch row used inside modal */
  .big-swatch-row { display: flex; align-items: center; gap: 10px; }
  .big-swatch {
    width: 40px; height: 40px;
    border-radius: 8px;
    border: 2px solid #fff;
    box-shadow: 0 0 0 1px var(--border-2), var(--shadow-1);
  }
  .shade-strip {
    display: flex; height: 22px; border-radius: 6px;
    overflow: hidden; gap: 2px;
  }
  .shade-strip > div { flex: 1; }

  /* Hex input row */
  .hex-input-row {
    display: flex; align-items: center; gap: 6px;
    min-width: 0;
  }
  .hex-input-row .input { font-family: var(--font-mono); min-width: 0; }
  .hex-input-row .big-swatch { width: 28px; height: 28px; flex-shrink: 0; }

  /* Spacing row */
  .range-row { display: flex; align-items: center; gap: 10px; }
  .range-row label { font-size: 11.5px; color: var(--text-2); width: 90px; flex-shrink: 0; }
  .range-row input[type="range"] { flex: 1; accent-color: var(--text); }
  .range-row .val {
    font-family: var(--font-mono); font-size: 11px; color: var(--text-3);
    width: 50px; text-align: right;
  }

  /* ── Content workspace ───────────────────────────────────────────────── */
  .ct-grid {
    display: grid;
    grid-template-columns: 280px 1fr 320px;
    height: 100%;
    overflow: hidden;
  }
  body[data-density="compact"] .ct-grid { grid-template-columns: 240px 1fr 280px; }
  body[data-density="cozy"]    .ct-grid { grid-template-columns: 300px 1fr 340px; }

  .ct-left  { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
  .ct-mid   { background: var(--bg-2); display: flex; flex-direction: column; min-height: 0; overflow: hidden; position: relative; }
  .ct-right { background: var(--surface); border-left:  1px solid var(--border); display: flex; flex-direction: column; min-height: 0; overflow: hidden; }

  /* Left pane page selector */
  .ct-page-select {
    margin: 10px 12px 0;
    display: grid; gap: 4px;
  }
  .ct-page-row {
    appearance: none; border: 1px solid transparent; background: transparent;
    height: 30px; padding: 0 10px;
    font: inherit; font-size: 12.5px; color: var(--text-2);
    border-radius: 7px;
    cursor: default;
    display: flex; align-items: center; gap: 8px;
    text-align: left;
    width: 100%;
  }
  .ct-page-row:hover { background: var(--hover); color: var(--text); }
  .ct-page-row[aria-selected="true"] {
    background: var(--surface-2);
    border-color: var(--border-2);
    color: var(--text);
    box-shadow: var(--shadow-1);
  }
  .ct-page-row .pgnum {
    font-family: var(--font-mono); font-size: 10px; color: var(--text-4);
    width: 20px;
  }
  .ct-page-row .pname { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
  .ct-page-row .pslug { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-4); }
  .ct-page-row .pcount { font-family: var(--font-mono); font-size: 10px; color: var(--text-4); margin-left: 4px; }
  .ct-page-row[data-hidden="true"] .pname { color: var(--text-3); }
  .ct-page-row[data-hidden="true"] .pname::after {
    content: "cachée";
    margin-left: 6px;
    font-family: var(--font-mono); font-size: 9px;
    color: var(--text-4);
    background: var(--bg-2);
    padding: 1px 5px; border-radius: 3px;
    text-transform: uppercase; letter-spacing: .05em;
  }

  /* Sections list (left pane) */
  .ct-sec-list { padding: 4px 8px 0; display: grid; gap: 2px; }
  .ct-sec-row {
    appearance: none; border: 0; background: transparent;
    padding: 6px 8px;
    font: inherit; font-size: 12px; color: var(--text-2);
    border-radius: 6px;
    cursor: default;
    display: flex; align-items: center; gap: 8px;
    text-align: left;
    width: 100%;
  }
  .ct-sec-row:hover { background: var(--hover); color: var(--text); }
  .ct-sec-row[aria-selected="true"] { background: var(--accent-tint); color: var(--accent-2); }
  .ct-sec-row .stype {
    font-family: var(--font-mono); font-size: 9.5px;
    color: var(--text-4);
    background: var(--bg-2);
    padding: 1px 5px; border-radius: 3px;
    text-transform: uppercase; letter-spacing: .04em;
    flex-shrink: 0;
  }
  .ct-sec-row[aria-selected="true"] .stype { background: rgba(226,85,43,.18); color: var(--accent-2); }
  .ct-sec-row .sname { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ct-sec-row .tagbadge {
    display: inline-flex; align-items: center; gap: 3px;
    background: var(--info-tint); color: var(--info);
    font-family: var(--font-mono); font-size: 9.5px; font-weight: 500;
    padding: 1px 5px; border-radius: 3px;
    flex-shrink: 0;
  }
  .ct-sec-row .hide-ic { color: var(--text-4); }

  /* Stats editor (chiffres clés) */
  .ct-stats { padding: 12px; }
  .ct-stats-hd {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 6px;
  }
  .ct-stats-hd h4 {
    margin: 0; font-size: 12.5px; font-weight: 600; color: var(--text);
    display: inline-flex; align-items: center; gap: 6px;
  }
  .ct-stats-hd .saved-pill {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--ok);
    background: rgba(31,138,91,.10);
    padding: 1px 6px; border-radius: 3px;
  }
  .ct-stats .hint {
    font-size: 10.5px; color: var(--text-3); margin: 0 0 8px;
    line-height: 1.5;
  }
  .ct-stat-row {
    display: grid; grid-template-columns: 72px 1fr 22px; gap: 4px;
    align-items: center; margin-bottom: 4px;
  }
  .ct-stat-row .input {
    height: 24px; font-size: 11.5px; padding: 0 7px;
  }
  .ct-stat-row .input.val {
    font-family: var(--font-mono); font-weight: 600; color: var(--accent-2);
  }
  .ct-stat-row .del {
    appearance: none; border: 0; background: transparent;
    width: 22px; height: 22px;
    color: var(--text-4); cursor: default;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
  }
  .ct-stat-row .del:hover { background: rgba(181,50,47,.10); color: var(--danger); }
  .ct-stat-empty {
    font-size: 11px; color: var(--text-4); font-style: italic;
    padding: 6px 0; margin: 0;
  }

  /* Tag simulator bar (top of center) */
  .ct-simbar {
    display: flex; align-items: center; gap: 10px;
    height: 40px; flex-shrink: 0;
    padding: 0 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .ct-simbar .lead {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11.5px; color: var(--text-2); font-weight: 500;
    flex-shrink: 0;
  }
  .ct-simbar .lead .flask {
    width: 20px; height: 20px; border-radius: 5px;
    background: var(--magic-tint); color: var(--magic);
    display: inline-flex; align-items: center; justify-content: center;
  }
  .ct-simbar .chips {
    display: flex; flex-wrap: wrap; gap: 4px;
    flex: 1; min-width: 0;
  }
  .ct-tag-chip {
    appearance: none;
    background: var(--surface);
    border: 1px solid var(--border-2);
    height: 22px; padding: 0 9px;
    font: inherit; font-size: 11.5px; font-weight: 500;
    color: var(--text-2);
    border-radius: 999px;
    cursor: default;
    display: inline-flex; align-items: center; gap: 5px;
    white-space: nowrap;
  }
  .ct-tag-chip:hover { background: var(--surface-2); color: var(--text); }
  .ct-tag-chip[aria-pressed="true"] {
    background: var(--info-tint);
    border-color: rgba(42,111,219,.30);
    color: var(--info);
  }
  .ct-tag-chip[data-real="false"] { font-style: italic; border-style: dashed; }
  .ct-tag-chip[aria-pressed="true"][data-real="false"]::before {
    content: "sim";
    font-family: var(--font-mono); font-size: 8.5px;
    background: var(--info); color: #fff;
    padding: 1px 4px; border-radius: 3px;
    margin-right: 2px;
    text-transform: uppercase;
  }
  .ct-simbar .reset {
    flex-shrink: 0;
    appearance: none; background: transparent;
    border: 1px solid transparent;
    color: var(--text-3);
    font: inherit; font-size: 11.5px;
    padding: 0 8px; height: 22px;
    border-radius: 5px;
    cursor: default;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .ct-simbar .reset:hover { color: var(--text); background: var(--hover); }

  /* Center scroll area */
  .ct-scroll {
    flex: 1; overflow: auto;
    padding: 18px 18px 80px;
    display: flex; flex-direction: column; gap: 14px;
  }

  /* Schema-driven section card */
  .ct-card {
    flex-shrink: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color .12s ease, box-shadow .12s ease;
  }
  .ct-card[data-selected="true"] {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-tint);
  }
  .ct-card[data-hidden="true"] {
    opacity: .55;
    background: repeating-linear-gradient(135deg, var(--surface) 0 8px, var(--surface-2) 8px 16px);
  }
  .ct-card-hd {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface-2);
    cursor: default;
  }
  .ct-card-hd .type {
    font-family: var(--font-mono); font-size: 9.5px;
    color: var(--text-3);
    background: var(--bg-2);
    padding: 2px 6px; border-radius: 3px;
    text-transform: uppercase; letter-spacing: .05em;
  }
  .ct-card-hd .name { font-size: 12.5px; font-weight: 500; color: var(--text); flex: 1; }
  .ct-card-hd .actions { display: flex; align-items: center; gap: 4px; }
  .ct-card-hd .tagged {
    display: inline-flex; align-items: center; gap: 4px;
    font-family: var(--font-mono); font-size: 10px;
    background: var(--info-tint); color: var(--info);
    padding: 2px 6px; border-radius: 4px;
  }
  .ct-card[data-hidden="true"] .ct-hidden-banner {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 14px;
    background: rgba(200,136,31,.10);
    border-bottom: 1px solid rgba(200,136,31,.20);
    color: var(--warn);
    font-size: 11px;
    font-family: var(--font-mono);
  }
  .ct-card:not([data-hidden="true"]) .ct-hidden-banner { display: none; }

  .ct-card-body { padding: 12px 14px; display: grid; gap: 10px; }

  /* Schema field row */
  .ct-field {
    display: grid;
    grid-template-columns: 110px 1fr auto;
    gap: 10px;
    align-items: start;
    padding: 8px 0;
    border-top: 1px solid var(--border);
  }
  .ct-field:first-child { border-top: 0; padding-top: 0; }
  .ct-field-lbl {
    display: flex; flex-direction: column; gap: 2px;
    padding-top: 4px;
  }
  .ct-field-lbl .name {
    font-size: 11.5px; font-weight: 500; color: var(--text);
  }
  .ct-field-lbl .kind {
    font-family: var(--font-mono); font-size: 9.5px;
    color: var(--text-4);
    text-transform: lowercase;
  }
  .ct-field-val { min-width: 0; }
  .ct-field-val .input,
  .ct-field-val .textarea {
    background: var(--bg);
    border-color: transparent;
  }
  .ct-field-val .input:hover,
  .ct-field-val .textarea:hover { border-color: var(--border-2); background: var(--surface); }
  .ct-field-val .input:focus,
  .ct-field-val .textarea:focus { background: var(--surface); border-color: var(--text); }
  .ct-field-val .ct-img {
    display: flex; align-items: center; gap: 8px;
    border: 1px dashed var(--border-2);
    background: var(--surface-2);
    padding: 6px 8px; border-radius: 6px;
  }
  .ct-field-val .ct-img .thumb {
    width: 32px; height: 32px; border-radius: 4px;
    background: var(--bg-3);
    background-image: repeating-linear-gradient(135deg, rgba(20,18,14,.06) 0 6px, transparent 6px 12px);
    display: flex; align-items: center; justify-content: center;
    color: var(--text-4); flex-shrink: 0;
  }
  .ct-field-val .ct-img .info { flex: 1; min-width: 0; }
  .ct-field-val .ct-img .info .fname {
    font-size: 12px; color: var(--text);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .ct-field-val .ct-img .info .desc {
    font-size: 10.5px; color: var(--text-4); font-family: var(--font-mono);
  }
  .ct-field-val .ct-btn-row {
    display: grid; grid-template-columns: auto 1fr; gap: 6px;
    align-items: center;
    padding: 6px 8px; background: var(--surface-2);
    border: 1px solid var(--border); border-radius: 6px;
  }
  .ct-field-val .ct-btn-row .lbl-pill {
    font-family: var(--font-mono); font-size: 9.5px;
    background: var(--text); color: var(--bg);
    padding: 2px 6px; border-radius: 3px;
    text-transform: uppercase; letter-spacing: .04em;
  }
  .ct-field-val .ct-btn-row .lbl-pill.secondary { background: var(--bg-2); color: var(--text-2); }

  /* Block row (e.g. feature cards) */
  .ct-blocks {
    display: grid; gap: 6px;
    padding: 8px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .ct-block {
    display: grid;
    grid-template-columns: 22px 1fr auto auto;
    gap: 8px; align-items: center;
    padding: 6px 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 5px;
  }
  .ct-block[data-filtered="true"] {
    opacity: .35;
    background: repeating-linear-gradient(135deg, var(--surface) 0 6px, var(--surface-2) 6px 12px);
  }
  .ct-block .handle {
    width: 14px; height: 14px;
    color: var(--text-4);
    cursor: default;
  }
  .ct-block .btitle { font-size: 12px; color: var(--text); font-weight: 500; }
  .ct-block .bbody { font-size: 11px; color: var(--text-3); }
  .ct-block .btxt { min-width: 0; overflow: hidden; }
  .ct-block .btxt .input, .ct-block .btxt .textarea {
    background: transparent; border-color: transparent; height: 22px; padding: 0;
    font-size: 12px;
  }
  .ct-block .btxt .input:hover, .ct-block .btxt .textarea:hover {
    background: var(--bg); border-color: var(--border-2);
    height: 24px; padding: 0 6px;
  }
  .ct-block .btxt .input:focus { background: var(--bg); border-color: var(--text); height: 24px; padding: 0 6px; }

  /* Inline tag picker — appears on field + block + section */
  .ct-tag-picker {
    appearance: none;
    background: var(--bg-2);
    border: 1px dashed var(--border-2);
    height: 20px; padding: 0 6px;
    font: inherit; font-size: 10.5px;
    color: var(--text-3);
    border-radius: 4px;
    cursor: default;
    display: inline-flex; align-items: center; gap: 4px;
    font-family: var(--font-mono);
    white-space: nowrap;
  }
  .ct-tag-picker:hover { background: var(--surface-2); border-color: var(--border-strong); color: var(--text); }
  .ct-tag-picker[data-set="true"] {
    background: var(--info-tint);
    border-style: solid;
    border-color: rgba(42,111,219,.30);
    color: var(--info);
  }
  .ct-tag-picker svg { opacity: .55; }

  /* Tag picker popover */
  .ct-tag-pop {
    position: absolute;
    z-index: 60;
    width: 200px;
    background: var(--surface);
    border: 1px solid var(--border-2);
    border-radius: 8px;
    box-shadow: var(--shadow-pop);
    padding: 6px;
  }
  .ct-tag-pop .ct-pop-hd {
    font-size: 10.5px; font-weight: 600; color: var(--text-3);
    text-transform: uppercase; letter-spacing: .06em;
    padding: 4px 6px 6px;
  }
  .ct-tag-pop .ct-pop-item {
    appearance: none; border: 0; background: transparent;
    width: 100%; height: 24px;
    padding: 0 6px;
    border-radius: 4px;
    font: inherit; font-size: 12px;
    color: var(--text-2);
    cursor: default;
    display: flex; align-items: center; gap: 6px;
    text-align: left;
  }
  .ct-tag-pop .ct-pop-item:hover { background: var(--hover); color: var(--text); }
  .ct-tag-pop .ct-pop-item[aria-pressed="true"] { background: var(--info-tint); color: var(--info); }
  .ct-tag-pop .ct-pop-item .dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--info); opacity: .5;
  }
  .ct-tag-pop .ct-pop-item[aria-pressed="true"] .dot { opacity: 1; }
  .ct-tag-pop .ct-pop-clear {
    border-top: 1px solid var(--border);
    margin-top: 4px;
    padding-top: 4px;
  }
  .ct-tag-pop .ct-pop-clear button {
    width: 100%; justify-content: flex-start;
    color: var(--danger);
  }

  /* Right pane (inspector) */
  .ct-insp { padding: 14px; }
  .ct-insp .empty {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    padding: 40px 16px;
    text-align: center;
  }
  .ct-insp .empty .ic {
    width: 44px; height: 44px; border-radius: 10px;
    background: var(--bg-2); color: var(--text-4);
    display: flex; align-items: center; justify-content: center;
  }
  .ct-insp .empty p {
    margin: 0; font-size: 12px; color: var(--text-3); line-height: 1.5;
    max-width: 200px;
  }

  .ct-insp .schema-overview {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 12px;
  }
  .ct-insp .schema-overview .lbl {
    font-family: var(--font-mono); font-size: 9.5px;
    color: var(--text-4);
    text-transform: uppercase; letter-spacing: .06em;
    margin-bottom: 6px;
  }
  .ct-insp .schema-overview .schema-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 4px 8px;
  }
  .ct-insp .schema-overview .schema-grid > span {
    font-size: 11px; color: var(--text-2);
    display: flex; align-items: center; gap: 5px;
  }
  .ct-insp .schema-overview .schema-grid > span code {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--text-4);
  }

  .ct-insp .insp-section {
    border-top: 1px solid var(--border);
    padding-top: 12px;
    margin-top: 12px;
  }
  .ct-insp .insp-section:first-of-type {
    border-top: 0; padding-top: 0; margin-top: 0;
  }
  .ct-insp .insp-section-hd {
    font-size: 10.5px; font-weight: 600; color: var(--text-3);
    text-transform: uppercase; letter-spacing: .06em;
    margin-bottom: 8px;
  }
  .ct-insp .visibility-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px;
    padding: 8px 10px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 8px;
    font-size: 12px;
  }
  .ct-insp .visibility-row > span {
    display: inline-flex; align-items: center;
    min-width: 0; flex: 1;
    line-height: 1.3;
  }
  .ct-insp .visibility-row[data-state="visible"] { color: var(--ok); border-color: rgba(31,138,91,.25); background: rgba(31,138,91,.06); }
  .ct-insp .visibility-row[data-state="hidden"]  { color: var(--warn); border-color: rgba(200,136,31,.25); background: rgba(200,136,31,.08); }

  /* Schema-as-source-of-truth callout */
  .ct-schema-callout {
    margin: 0 18px 0;
    padding: 8px 12px;
    background: var(--magic-tint);
    border: 1px solid rgba(122,90,224,.20);
    border-radius: 8px;
    display: flex; align-items: center; gap: 8px;
    font-size: 11.5px;
    color: var(--magic);
  }
  .ct-schema-callout .x {
    appearance: none; border: 0; background: transparent;
    color: var(--magic); cursor: default;
    padding: 0; margin-left: auto;
    width: 18px; height: 18px;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
  }
  .ct-schema-callout .x:hover { background: rgba(122,90,224,.12); }
</style>
</head>
